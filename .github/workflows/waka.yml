name: Waka Readme

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

# Important: Give write permission
permissions:
  contents: write

jobs:
  update-readme:
    name: Update WakaTime Stats
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4      # ← Updated to v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}   # ← Use built-in GITHUB_TOKEN

      - name: Generate WakaTime Stats
        uses: anmol098/waka-readme-stats@master
        with:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

          TIME_RANGE: "last_7_days"

          # Core stats
          SHOW_TOTAL_CODE_TIME: true
          SHOW_LINES_OF_CODE: true
          SHOW_SHORT_INFO: true

          # Languages
          SHOW_LANGUAGE: true
          SHOW_LANGUAGE_COUNT: 8
          SHOW_LANGUAGE_ICON: true
          SHOW_LANGUAGE_PERCENTAGE: true
          SHOW_TIME: true
          LANGUAGE_SECTION_TITLE: "### ⌨️ Languages"

          # Editors
          SHOW_EDITORS: true
          SHOW_EDITORS_COUNT: 3
          SHOW_EDITORS_TIME: true
          EDITOR_SECTION_TITLE: "###  Editors"

          # OS
          SHOW_OS: true
          SHOW_OS_COUNT: 3
          OS_SECTION_TITLE: "###  Operating Systems"

          # Projects (only enable if you want)
          SHOW_PROJECTS: false
          # SHOW_PROJECTS_COUNT: 5

          # Other nice stats
          SHOW_DAYS_OF_WEEK: true
          SHOW_TIMEZONE: true
          SHOW_COMMIT: true

          # Layout
          LAYOUT: "default"
          BAR_LENGTH: 20
          SECTION_SEPARATOR: "---"

          # Disable unnecessary stuff
          SHOW_PROFILE_VIEWS: false
          SHOW_LANGUAGE_PER_REPO: false
          SHOW_LOC_CHART: false