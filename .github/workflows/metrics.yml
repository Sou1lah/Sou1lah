name: Metrics
on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:
permissions:
  contents: write
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GH_TOKEN }}
          user: Sou1lah
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: America/New_York
          config_order: base.header, base.activity, base.community, base.repositories, languages, topics, habits, music, wakatime, leetcode, achievements
          config_padding: 0, 8%
          config_width: 800
          config_height: 1200
          debug: yes
          
          # Languages
          plugin_languages: yes
          plugin_languages_ignored: html, css
          plugin_languages_limit: 8
          plugin_languages_details: bytes-size, percentage
          plugin_languages_sections: most-used
          
          # Topics
          plugin_topics: yes
          plugin_topics_limit: 15
          plugin_topics_mode: icons
          plugin_topics_sort: stars
          
          # Habits
          plugin_habits: yes
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          plugin_habits_trim: yes
          
          # Music
          plugin_music: yes
          plugin_music_provider: spotify
          plugin_music_mode: recent
          plugin_music_limit: 4
          plugin_music_token: ${{ secrets.SPOTIFY_TOKEN }}
          
          # Wakatime
          plugin_wakatime: yes
          plugin_wakatime_token: ${{ secrets.WAKATIME_API_KEY }}
          plugin_wakatime_sections: time, projects, projects-graphs, languages, languages-graphs, editors, os
          
          # LeetCode
          plugin_leetcode: yes
          plugin_leetcode_user: BRH1F6rBzt
          plugin_leetcode_sections: solved, skills, recent
          plugin_leetcode_limit_recent: 3
          plugin_leetcode_limit_skills: 10
          
          # Achievements (Bonus for better stats)
          plugin_achievements: yes
          plugin_achievements_threshold: C
          plugin_achievements_display: compact
