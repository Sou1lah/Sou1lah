name: GitHub-Profile-3D-Contrib

on:
  schedule:
    # Every 2 hours (runs at :00 of every even hour)
    - cron: "0 */2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    name: Generate GitHub Profile 3D Contributions

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Generate 3D Contribution Graph
        uses: yoshi389111/github-profile-3d-contrib@latest
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          USERNAME: ${{ github.repository_owner }}

      - name: Commit & Push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add -A .
          
          # Always commit with timestamp so GitHub updates the image even if the graph data is similar
          if git commit -m "chore: update 3D contribution graph $(date -u +'%Y-%m-%d %H:%M:%S UTC')"; then
            git push
            echo "✅ 3D contribution graph updated and pushed"
          else
            echo "ℹ️  No changes to commit (graph may still be cached by GitHub)"
          fi